<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="VmGN_6lB30wphsQ4v-vTdsv3Wyax4XMeylYzYD5EHHQ">
<meta name="description" content="As notícias mais pesquisadas do mundo em tecnologia, ciência, medicina e inovação.">
<title>Notícias Mais Pesquisadas no Mundo</title>

<script async
src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5386266174463642"
crossorigin="anonymous"></script>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
}
body.light{
  --bg:#f1f5f9;
  --card:#fff;
  --text:#0f172a;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:20px;
  text-align:center;
  background:#020617;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
}
img{
  width:100%;
  border-radius:10px;
  max-height:200px;
  object-fit:cover;
}
button{
  padding:10px;
  margin:5px;
  cursor:pointer;
}
footer{
  text-align:center;
  padding:20px;
  background:#020617;
  margin-top:40px;
}
a{color:#38bdf8;}
</style>
</head>

<body>

<header>
<h1 id="title">🌐 Notícias Mais Pesquisadas no Mundo</h1>
<p id="updateDate"></p>
<p><span id="visitorText">Visitantes:</span> <span id="visitorCount">0</span></p>

<button onclick="toggleLanguage()">🌍 PT / EN</button>
<button onclick="toggleTheme()">🌙 Tema</button>
</header>

<div class="container" id="newsContainer">
<p>A carregar notícias...</p>
</div>

<footer>
<p>Este website funciona como agregador de notícias, mostrando apenas títulos, resumos e links para as fontes oficiais.</p>
</footer>

<script>
const topics = [
  {pt:"Inteligência Artificial",en:"Artificial Intelligence",search:"artificial intelligence"},
  {pt:"Tecnologia",en:"Technology",search:"technology"},
  {pt:"Medicina",en:"Medicine",search:"medicine"},
  {pt:"Ciência",en:"Science",search:"science"},
  {pt:"Espaço",en:"Space",search:"space"},
  {pt:"Energia",en:"Energy",search:"energy"}
];

let lang = "pt";

// CONTADOR
async function updateVisitorCount(){
  try{
    const response = await fetch(
      "https://api.countapi.xyz/hit/jmar-tech-news-site/visits"
    );

    const data = await response.json();

    document.getElementById("visitorCount").innerText =
      data.value || 0;

  }catch(error){
    console.error(error);
    document.getElementById("visitorCount").innerText = "0";
  }
}

function toggleLanguage(){
  lang = lang === "pt" ? "en" : "pt";

  document.getElementById("title").innerText =
    lang === "pt"
      ? "🌐 Notícias Mais Pesquisadas no Mundo"
      : "🌐 Most Searched News in the World";

  document.getElementById("visitorText").innerText =
    lang === "pt" ? "Visitantes:" : "Visitors:";

  loadAllNews();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

async function loadAllNews(){
  const container = document.getElementById("newsContainer");
  container.innerHTML = "";

  for(const topic of topics){
    try{
      const res = await fetch(
        "https://api.spaceflightnewsapi.net/v4/articles/?search=" +
        encodeURIComponent(topic.search)
      );

      const data = await res.json();

      if(!data.results || !data.results.length) continue;

      let section = `
        <h2>${lang === "pt" ? topic.pt : topic.en}</h2>
        <div class="grid">
      `;

      data.results.slice(0,2).forEach(article=>{
        const resumo = article.summary
          ? article.summary.substring(0,180) + "..."
          : "";

        section += `
          <div class="card">
            <img src="${article.image_url || ''}"
                 alt="${article.title}"
                 loading="lazy"
                 onerror="this.style.display='none'">
            <h3>${article.title}</h3>
            <p>${resumo}</p>
            <a href="${article.url}" target="_blank" rel="noopener noreferrer">
              Read more
            </a>
          </div>
        `;
      });

      section += "</div>";
      container.innerHTML += section;

    }catch(error){
      console.error(error);
    }
  }

  document.getElementById("updateDate").innerText =
    (lang === "pt" ? "Atualizado: " : "Updated: ") +
    new Date().toLocaleDateString();
}

updateVisitorCount();
loadAllNews();

setInterval(loadAllNews, 86400000);
</script>

</body>
</html>
