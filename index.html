<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashNotícias | Jornal Online</title>

<style>
body { margin:0; font-family: Arial; background:#f4f4f4 }

header {
  background:#c40000;
  color:#fff;
  padding:20px;
  text-align:center;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.hero, .sidebar, .card {
  background:#fff;
  border-radius:8px;
  overflow:hidden;
}

.hero img {
  width:100%;
  height:300px;
  object-fit:cover;
}

.hero h2 { padding:15px }

.sidebar { padding:15px }

.side-item {
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:10px;
  cursor:pointer;
}

.card {
  padding:15px;
  margin-bottom:15px;
  cursor:pointer;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:6px;
  margin-bottom:10px;
}

@media(max-width:768px){
  .grid { grid-template-columns:1fr }
}
</style>
</head>

<body>

<header>
<h1>⚡ FlashNotícias</h1>
<p>Últimas notícias de Portugal e do mundo</p>
</header>

<div class="container">

<div class="grid">
<div id="hero"></div>
<div class="sidebar">
<h3>📰 Últimas</h3>
<div id="sidebar"></div>
</div>
</div>

<div id="news"></div>

</div>

<script>

const RSS_URL = "https://api.allorigins.win/get?url=" +
encodeURIComponent("https://feeds.bbci.co.uk/news/rss.xml");

function abrir(url){
  if(url) window.open(url, "_blank", "noopener,noreferrer");
}

function extrairImagem(desc){
  if(!desc) return "https://via.placeholder.com/800x400";
  const match = desc.match(/<img.*?src="(.*?)"/);
  return match ? match[1] : "https://via.placeholder.com/800x400";
}

async function loadNews(){

  const hero = document.getElementById("hero");
  const sidebar = document.getElementById("sidebar");
  const news = document.getElementById("news");

  try {

    const res = await fetch(RSS_URL);

    if(!res.ok){
      throw new Error("Erro HTTP");
    }

    const data = await res.json();

    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");

    const items = xml.querySelectorAll("item");

    if(items.length === 0){
      throw new Error("Sem dados");
    }

    // limpar
    hero.innerHTML = "";
    sidebar.innerHTML = "";
    news.innerHTML = "";

    const artigos = [];

    items.forEach(item=>{
      artigos.push({
        title: item.querySelector("title")?.textContent || "",
        link: item.querySelector("link")?.textContent || "",
        desc: item.querySelector("description")?.textContent || ""
      });
    });

    // HERO
    const first = artigos[0];

    const heroDiv = document.createElement("div");
    heroDiv.className = "hero";
    heroDiv.onclick = () => abrir(first.link);

    heroDiv.innerHTML = `
      <img src="${extrairImagem(first.desc)}" onerror="this.remove()">
      <h2>🔴 ${first.title}</h2>
    `;

    hero.appendChild(heroDiv);

    // SIDEBAR
    artigos.slice(1,6).forEach(n=>{
      const div = document.createElement("div");
      div.className = "side-item";
      div.textContent = n.title;
      div.onclick = () => abrir(n.link);
      sidebar.appendChild(div);
    });

    // RESTO
    artigos.slice(6,15).forEach(n=>{
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => abrir(n.link);

      card.innerHTML = `
        <img src="${extrairImagem(n.desc)}" onerror="this.remove()">
        <h2>${n.title}</h2>
      `;

      news.appendChild(card);
    });

  } catch(e){
    console.error(e);
    document.getElementById("news").innerHTML = "⚠️ Erro ao carregar notícias";
  }
}

document.addEventListener("DOMContentLoaded", loadNews);

</script>

</body>
</html>
