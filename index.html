<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlashNotícias | Últimas notícias</title>

<meta name="description" content="Notícias de Portugal e do mundo em tempo real">

<style>
body { margin:0; font-family: Arial; background:#eef1f5 }

header {
  background:#c40000;
  color:#fff;
  padding:20px;
  text-align:center;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.destaque {
  background:#ffcc00;
  padding:10px;
  margin-bottom:15px;
  font-weight:bold;
}

.card {
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  cursor:pointer;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:6px;
  margin-bottom:10px;
}

.card h2 {
  font-size:18px;
}

.erro {
  color:red;
  text-align:center;
}
</style>
</head>

<body>

<header>
<h1>⚡ FlashNotícias</h1>
<p>Notícias em tempo real</p>
</header>

<div class="container">
<div id="app">🔄 A carregar notícias...</div>
</div>

<script>

const API_URL = "https://gnews.io/api/v4/top-headlines?lang=pt&max=10&token=demo";

// abrir notícia
function abrir(url){
  if(typeof url === "string" && url.startsWith("http")){
    window.open(url, "_blank", "noopener,noreferrer");
  }
}

// título viral
function tituloViral(t){
  if(!t) return "Notícia importante";
  if(t.toLowerCase().includes("última hora")) return t;
  return "🔴 ÚLTIMA HORA: " + t;
}

// criar card
function criarCard(n){

  const card = document.createElement("div");
  card.className = "card";

  if(n.url){
    card.onclick = () => abrir(n.url);
  }

  const img = document.createElement("img");

  if(n.image && typeof n.image === "string" && n.image.startsWith("http")){
    img.src = n.image;
  } else {
    img.src = "https://via.placeholder.com/800x400?text=Sem+Imagem";
  }

  img.onerror = () => {
    img.onerror = null;
    img.src = "https://via.placeholder.com/800x400?text=Imagem+Indisponível";
  };

  const h2 = document.createElement("h2");
  h2.textContent = tituloViral(n.title).slice(0,120);

  const p = document.createElement("p");
  p.textContent = n.description || "Sem descrição disponível";

  card.appendChild(img);
  card.appendChild(h2);
  card.appendChild(p);

  return card;
}

// carregar notícias
async function loadNews(){

  const container = document.getElementById("app");

  try {

    const res = await fetch(API_URL);

    if(!res.ok){
      throw new Error("Erro HTTP");
    }

    const data = await res.json();

    const artigos = Array.isArray(data.articles)
      ? data.articles.filter(n => n && n.title)
      : [];

    if(artigos.length === 0){
      throw new Error("Sem notícias");
    }

    container.innerHTML = "";

    // destaque
    const destaque = document.createElement("div");
    destaque.className = "destaque";
    destaque.textContent = tituloViral(artigos[0].title);
    container.appendChild(destaque);

    // lista
    artigos.forEach(n=>{
      container.appendChild(criarCard(n));
    });

  } catch(e){

    console.error(e);

    container.innerHTML = `
      <div class="erro">
        ⚠️ Não foi possível carregar notícias.<br>
        Tenta novamente mais tarde.
      </div>
    `;
  }
}

// iniciar
document.addEventListener("DOMContentLoaded", loadNews);

</script>

</body>
</html>
