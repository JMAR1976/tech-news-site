<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desporto</title>
<meta name="description" content="Notícias de desporto">
<link rel="icon" href="favicon.ico">
</head>

<body style="max-width:1000px;margin:auto;font-family:Arial;">
<h1>⚽ Desporto</h1>
<a href="index.html">⬅ Voltar</a>
<div id="news"></div>

<script>
const feed="https://api.rss2json.com/v1/api.json?rss_url=https://www.abola.pt/rss";

async function load(){
try{
const r=await fetch(feed);
const d=await r.json();

let html="";
d.items.slice(0,20).forEach(n=>{
html+=`<h3><a href="artigo.html?title=${encodeURIComponent(n.title)}&link=${encodeURIComponent(n.link)}">${n.title}</a></h3><p>${(n.description||"").substring(0,120)}</p><hr>`;
});
document.getElementById("news").innerHTML=html;

}catch(e){
document.getElementById("news").innerHTML="Erro ao carregar notícias";
}
}
load();
</script>

</body>
</html>
