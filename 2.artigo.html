<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artigo</title>
<meta name="description" content="Notícia atualizada">
<link rel="icon" href="favicon.ico">
</head>

<body style="max-width:800px;margin:auto;font-family:Arial;">

<h1 id="titulo"></h1>

<p><strong>Autor:</strong> Redação</p>
<p><strong>Data:</strong> <span id="data"></span></p>

<p id="conteudo"></p>

<a id="fonte" target="_blank" rel="noopener noreferrer">Fonte original</a>

<br><br>
<a href="index.html">⬅ Voltar</a>

<script>
const p=new URLSearchParams(window.location.search);

document.getElementById("titulo").innerText=p.get("title")||"Notícia";
document.getElementById("conteudo").innerText="Resumo da notícia.";
document.getElementById("data").innerText=new Date().toLocaleDateString();

if(p.get("link")){
document.getElementById("fonte").href=p.get("link");
}
</script>

</body>
</html>
